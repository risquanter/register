# Standalone compose file for serverIt integration tests.
#
# Used exclusively by IrminCompose (modules/server-it) to start an isolated
# Irmin instance per test run. Each run gets a unique project name
# (register_it_<uuid>) and a dynamically assigned host port, so multiple
# specs can run concurrently without competing for a fixed port.
#
# Dev workflow uses docker-compose.yml (static port 9080) — this file has no
# effect on it.
#
# IrminCompose discovers the assigned host port via `docker compose port irmin 8080`.

name: register-it

services:
  irmin:
    image: local/irmin-prod:3.11
    pull_policy: never
    ports:
      - "8080"    # dynamic host port — Docker assigns a free port per instance
    volumes:
      - irmin-data:/data
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=10M
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - --post-data='{\"query\":\"{ __typename }\"}' --header='Content-Type: application/json' http://127.0.0.1:8080/graphql | grep -q data"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    profiles:
      - persistence

  spicedb:
    image: authzed/spicedb:latest
    # serve + memory datastore: full token enforcement (required for T-S6 invalid-token test).
    # --grpc-preshared-key matches SpiceDbCompose.TestToken; any request with a different
    # bearer token gets HTTP 401 → AuthServiceUnavailable in the Scala adapter.
    # No TLS flags: SpiceDB serves plaintext gRPC/HTTP when no cert paths are given
    # (the old --grpc-no-tls flag was removed upstream; unknown flags crash the container).
    command: >
      serve
      --http-enabled
      --http-addr 0.0.0.0:8080
      --datastore-engine=memory
      --grpc-preshared-key=test-spicedb-token
      --skip-release-check
    ports:
      - "8080"    # dynamic host port — Docker assigns a free port per instance
    healthcheck:
      # grpc_health_probe is bundled in the authzed/spicedb image on PATH (the image is
      # distroless: no shell, and the binary is not at /grpc_health_probe in current tags)
      test: ["CMD", "grpc_health_probe", "-addr=localhost:50051"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    profiles:
      - authz

volumes:
  irmin-data:
