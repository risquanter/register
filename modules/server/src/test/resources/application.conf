# Test Configuration - mirrors main application.conf for tests

register {
  repository {
    repositoryType = "in-memory"
  }

  telemetry {
    serviceName = "risk-register"
    instrumentationScope = "com.risquanter.register"
    otlpEndpoint = "http://localhost:4317"
    devExportIntervalSeconds = 5
    prodExportIntervalSeconds = 60
  }

  workspace {
    ttl = 72h
    idleTimeout = 1h
    reaperInterval = 1m
    maxCreatesPerIpPerHour = 100
    maxTreesPerWorkspace = 10
  }

  workspaceStore {
    backend = "in-memory"
  }
}
