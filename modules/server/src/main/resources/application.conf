# Register Service Configuration

register {
  repository {
    repositoryType = "in-memory"
    repositoryType = ${?REGISTER_REPOSITORY_TYPE}
  }

  server {
    host = "0.0.0.0"
    host = ${?REGISTER_SERVER_HOST}
    port = 8090
    port = ${?REGISTER_SERVER_PORT}
    # Dedicated health-probe port for kubelet liveness/readiness probes.
    # Separated from main API port to allow per-port mTLS policy:
    #   port 8090 (API)    → PeerAuthentication STRICT
    #   port 8091 (probes) → PeerAuthentication PERMISSIVE
    # @see ADR-012 (service mesh); mirrors OPA diagnostic-port pattern.
    healthPort = 8091
    healthPort = ${?REGISTER_HEALTH_PORT}
  }
  
  simulation {
    defaultNTrials = 10000
    defaultNTrials = ${?REGISTER_DEFAULT_NTRIALS}
    maxTreeDepth = 5
    maxTreeDepth = ${?REGISTER_MAX_TREE_DEPTH}
    defaultTrialParallelism = 8
    defaultTrialParallelism = ${?REGISTER_TRIAL_PARALLELISM}
    maxConcurrentSimulations = 4
    maxConcurrentSimulations = ${?REGISTER_MAX_CONCURRENT_SIMULATIONS}
    maxNTrials = 1000000
    maxNTrials = ${?REGISTER_MAX_NTRIALS}
    maxParallelism = 16
    maxParallelism = ${?REGISTER_MAX_PARALLELISM}
    # HDR seeds for reproducible simulations (ADR-003)
    defaultSeed3 = 0
    defaultSeed3 = ${?REGISTER_SEED3}
    defaultSeed4 = 0
    defaultSeed4 = ${?REGISTER_SEED4}
  }
  
  telemetry {
    serviceName = "risk-register"
    serviceName = ${?OTEL_SERVICE_NAME}
    instrumentationScope = "com.risquanter.register"
    otlpEndpoint = "http://localhost:4317"
    otlpEndpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    devExportIntervalSeconds = 5
    prodExportIntervalSeconds = 60
  }
  
  cors {
    allowedOrigins = ["http://localhost:3000", "http://localhost:5173"]
    allowedOrigins = ${?REGISTER_CORS_ORIGINS}
  }

  auth {
    mode = "capability-only"
    mode = ${?REGISTER_AUTH_MODE}
  }

  # SpiceDB connectivity — read only when auth.mode = "fine-grained"
  # (Application.chooseAuthorizationService builds SpiceDbConfig lazily in that branch).
  # No in-file defaults: fine-grained mode fails at startup unless SPICEDB_URL and
  # SPICEDB_TOKEN are set — fail-closed by construction. consistency and timeoutSeconds
  # fall back to the SpiceDbConfig case-class defaults when unset.
  # @see AUTHORIZATION-PLAN.md §L2.2; SpiceDbConfig.scala
  spicedb {
    url = ${?SPICEDB_URL}
    token = ${?SPICEDB_TOKEN}
    # "minimize-latency" (default) | "fully-consistent"
    consistency = ${?SPICEDB_CONSISTENCY}
    timeoutSeconds = ${?SPICEDB_TIMEOUT_SECONDS}
  }

  workspace {
    ttl = 72h
    ttl = ${?REGISTER_WORKSPACE_TTL}
    idleTimeout = 1h
    idleTimeout = ${?REGISTER_WORKSPACE_IDLE_TIMEOUT}
    reaperInterval = 5m
    reaperInterval = ${?REGISTER_WORKSPACE_REAPER_INTERVAL}
    maxCreatesPerIpPerHour = 5
    maxCreatesPerIpPerHour = ${?REGISTER_WORKSPACE_MAX_CREATES_PER_IP}
    maxTreesPerWorkspace = 10
    maxTreesPerWorkspace = ${?REGISTER_WORKSPACE_MAX_TREES}
  }

  workspaceStore {
    backend = "in-memory"
    backend = ${?REGISTER_WORKSPACE_STORE_BACKEND}
  }
  
  db {
    dataSourceClassName = org.postgresql.ds.PGSimpleDataSource
    dataSource {
      user = register
      user = ${?REGISTER_DB_USER}
      password = register
      password = ${?REGISTER_DB_PASSWORD}
      databaseName = register
      databaseName = ${?REGISTER_DB_NAME}
      portNumber = 5432
      portNumber = ${?REGISTER_DB_PORT}
      serverName = localhost
      serverName = ${?REGISTER_DB_HOST}
    }
  }

  flyway {
    url = "jdbc:postgresql://localhost:5432/register"
    url = ${?REGISTER_FLYWAY_URL}
    user = register
    user = ${?REGISTER_DB_USER}
    password = register
    password = ${?REGISTER_DB_PASSWORD}
    # classpath: works when running on a real JVM (sbt run, serverIt).
    # The native-image container overrides this to filesystem:/app/db/migration —
    # see Dockerfile.register-prod for why classpath scanning doesn't work there.
    migrationsLocation = "classpath:db/migration"
    migrationsLocation = ${?REGISTER_FLYWAY_MIGRATIONS_LOCATION}
  }
  
  irmin {
    url = "http://localhost:9080"
    url = ${?IRMIN_URL}
    branch = "main"
    branch = ${?IRMIN_BRANCH}
    timeout = 30s
    timeout = ${?IRMIN_TIMEOUT}
    # Startup readiness gate (ADR-031): bounded, fail-closed wait for irmin at boot.
    # attemptTimeout bounds each probe; budget bounds the total wait (capped jittered
    # exponential backoff in between). Size the budget above the platform's
    # policy-reconciliation window (ArgoCD sync + mesh programming).
    healthCheckAttemptTimeout = 5s
    healthCheckAttemptTimeout = ${?IRMIN_HEALTHCHECK_ATTEMPT_TIMEOUT}
    healthCheckBudget = 45s
    healthCheckBudget = ${?IRMIN_HEALTHCHECK_BUDGET}
  }
}
