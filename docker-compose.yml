name: register

services:
  # ============================================================================
  # PostgreSQL (Workspace durable store)
  # ============================================================================
  postgres:
    image: postgres:17-alpine
    container_name: register-postgres
    environment:
      POSTGRES_DB: register
      POSTGRES_USER: register_app
      POSTGRES_PASSWORD: dev-only-password
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U register_app -d register"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - register-network
    profiles:
      - persistence

  # ============================================================================
  # Irmin GraphQL Server (Persistence Layer)
  # ============================================================================
  irmin:
    build:
      context: .
      dockerfile: containers/prod/Dockerfile.irmin-prod
    image: local/irmin-prod:3.11
    pull_policy: build
    container_name: irmin-graphql
    ports:
      - "9080:8080"  # Expose on 9080 to avoid conflict with register-server
    volumes:
      - irmin-data:/data
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=10M  # irmin may need tmp space; constrained
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - --post-data='{\"query\":\"{ __typename }\"}' --header='Content-Type: application/json' http://127.0.0.1:8080/graphql | grep -q data"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - register-network
    profiles:
      - persistence  # Start with: docker compose --profile persistence up

  # ============================================================================
  # Risk Register Server (Native GraalVM on Distroless)
  # ============================================================================
  register-server:
    build:
      context: .
      dockerfile: containers/prod/Dockerfile.register-prod
    pull_policy: build
    container_name: register-server
    ports:
      - "8090:8090"
      - "8091:8091"  # Health probe port (kubelet liveness/readiness)
    environment:
      # Server configuration
      REGISTER_SERVER_HOST: "0.0.0.0"
      REGISTER_SERVER_PORT: "8090"
      REGISTER_HEALTH_PORT: "8091"
      
      # Simulation configuration
      REGISTER_DEFAULT_NTRIALS: "10000"
      REGISTER_MAX_TREE_DEPTH: "5"
      REGISTER_TRIAL_PARALLELISM: "8"
      REGISTER_MAX_CONCURRENT_SIMULATIONS: "4"
      REGISTER_MAX_NTRIALS: "1000000"
      REGISTER_MAX_PARALLELISM: "16"
      
      # CORS configuration
      REGISTER_CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"

      # Workspace creation rate limit — defaults to 5/hour (anti-abuse).
      # Test suites override by exporting REGISTER_WORKSPACE_MAX_CREATES_PER_IP
      # before 'docker compose up' (see tests/bats/suite-*.bats setup_file).
      REGISTER_WORKSPACE_MAX_CREATES_PER_IP: "${REGISTER_WORKSPACE_MAX_CREATES_PER_IP:-5}"

      # Repository backend — defaults to in-memory. Set to 'irmin' for
      # persistent storage. Suite D injects these for E2E testing.
      REGISTER_REPOSITORY_TYPE: "${REGISTER_REPOSITORY_TYPE:-in-memory}"
      IRMIN_URL: "${IRMIN_URL:-http://irmin:8080}"

      # Workspace store backend — defaults to in-memory.
      # Set to 'postgres' to enable durable workspace metadata.
      REGISTER_WORKSPACE_STORE_BACKEND: "${REGISTER_WORKSPACE_STORE_BACKEND:-in-memory}"
      REGISTER_DB_HOST: "${REGISTER_DB_HOST:-postgres}"
      REGISTER_DB_PORT: "${REGISTER_DB_PORT:-5432}"
      REGISTER_DB_NAME: "${REGISTER_DB_NAME:-register}"
      REGISTER_DB_USER: "${REGISTER_DB_USER:-register_app}"
      REGISTER_DB_PASSWORD: "${REGISTER_DB_PASSWORD:-dev-only-password}"
      REGISTER_FLYWAY_URL: "${REGISTER_FLYWAY_URL:-jdbc:postgresql://postgres:5432/register}"
      
      # Telemetry configuration
      # NOTE: TracingLive.console & MetricsLive.console are configured but produce
      # no visible output (likely log at DEBUG level filtered by default log config).
      # For working telemetry: switch to TracingLive.otlp & MetricsLive.otlp, then run:
      # docker-compose --profile observability up
      OTEL_SERVICE_NAME: "risk-register"
      # OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"  # Unused with console exporters
    image: register-server:prod
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 256M
        reservations:
          cpus: '0.5'
          memory: 64M
    # Docker-level healthcheck disabled: distroless has no curl/wget/shell.
    # The dedicated health port (8091) serves /health and /ready for kubelet
    # probes in k8s. For local docker-compose, use external monitoring:
    #   curl http://localhost:8090/health  (API port, always available)
    #   curl http://localhost:8091/health  (probe port, same response)
    restart: unless-stopped
    networks:
      - register-network

  # OpenTelemetry Collector (optional - for observability)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics
      - "8889:8889"   # Prometheus exporter
    networks:
      - register-network
    profiles:
      - observability

  # ============================================================================
  # Frontend SPA (nginx — production image)
  # ============================================================================
  # Serves static SPA assets and proxies API requests to register-server.
  # Profile-gated: does not start with plain `docker compose up` (dev workflow
  # uses Vite dev server at localhost:5173 instead).
  #
  # Start with:  docker compose --profile frontend up
  # Full stack:  docker compose --profile persistence --profile frontend up
  frontend:
    build:
      context: ..
      dockerfile: register/containers/prod/Dockerfile.frontend-prod
    image: local/frontend:dev
    pull_policy: build
    container_name: frontend
    ports:
      - "18080:8080"
    environment:
      # Backend URL — uses Compose service name (resolved via Docker DNS).
      # Override with k8s FQDN in Helm values for Kubernetes deployment.
      BACKEND_URL: "http://register-server:8090"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=10M
    depends_on:
      - register-server
    restart: unless-stopped
    networks:
      - register-network
    profiles:
      - frontend

networks:
  register-network:
    driver: bridge

volumes:
  irmin-data:
    driver: local
  pg-data:
    driver: local
